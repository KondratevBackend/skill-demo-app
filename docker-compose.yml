x-logging-common: &logging-common
  logging:
    options:
      max-size: "10m"
      max-file: "3"
services:
  telegram-bot:
    container_name: telegram-bot
    build:
      context: .
      dockerfile: "./Dockerfile"
    image: telegram_bot
    command: [
      "bash",
      "-c",
      "alembic upgrade heads && python manager.py run-telegram-bot"
    ]
    volumes:
      - .:/app
    env_file:
      - .env
    restart: always

  database:
    image: postgres:15
    container_name: database
    volumes:
      - telegram_bot_db_data:/var/lib/postgresql/data/
    env_file:
      - .env
    ports:
      - "${EXTERNAL_DB_PORT:-5432}:5432"
    healthcheck:
      test: [
        "CMD-SHELL",
        "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
      ]
      interval: 1s
      timeout: 5s
      retries: 10
    restart: always
    !!merge <<: *logging-common

  redis:
    container_name: redis
    image: redis/redis-stack:7.4.0-v1
    command: [
      "redis-server",
      "--requirepass",
      "${REDIS_PASSWORD}",
      "--loadmodule",
      "/opt/redis-stack/lib/redisearch.so",
      "--loadmodule",
      "/opt/redis-stack/lib/rejson.so"
    ]
    ports:
      - "${EXTERNAL_REDIS_PORT:-6379}:6379"
    !!merge <<: *logging-common

  worker:
    container_name: worker
    image: telegram_bot
    command: [
      "bash",
      "-c",
      "taskiq worker src.worker.main:broker -fsd -tp **/tasks.py -tp **/*_worker.py -tp **/worker.py --workers 1"
    ]
    volumes:
      - .:/app
    expose:
      - 9101
    depends_on:
      - database
      - telegram-bot
      - redis
    !!merge <<: *logging-common

  scheduler:
    container_name: scheduler
    image: telegram_bot
    command: [
      "bash",
      "-c",
      "taskiq scheduler src.worker.main:scheduler -fsd -tp **/*_worker.py -tp **/worker.py"
    ]
    volumes:
      - .:/app
    expose:
      - 9102
    depends_on:
      - worker
    !!merge <<: *logging-common


volumes:
  telegram_bot_db_data:

networks:
  default:
    name: telegram_network
